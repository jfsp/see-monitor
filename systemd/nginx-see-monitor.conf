# SEE-Monitor: Sample nginx Reverse Proxy Configuration
# Place in /etc/nginx/sites-available/see-monitor and symlink to sites-enabled.
#
# This config:
#   - Terminates TLS (you supply the certificate)
#   - Proxies to Gunicorn on 127.0.0.1:5000
#   - Redirects HTTP → HTTPS
#   - Sets security headers that complement the app's own headers
#
# Replace:
#   your.domain.example   with your actual FQDN
#   /path/to/cert.pem     with your TLS certificate path
#   /path/to/key.pem      with your TLS private key path
#
# Obtain a free certificate with Let's Encrypt:
#   sudo certbot --nginx -d your.domain.example
#
# SPDX-License-Identifier: GPL-3.0-or-later

server {
    listen 80;
    listen [::]:80;
    server_name your.domain.example;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your.domain.example;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;

    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # Note: CSP is set by the Flask app; add here if you want to tighten further

    # ── Proxy to Gunicorn ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;   # allow time for scan API calls

        proxy_buffering    off;
        proxy_buffer_size  8k;
    }

    # ── Static assets (served directly if you extract them) ───────────────────
    # SEE-Monitor embeds all assets inline; this block is here for future use.
    location /static/ {
        alias /opt/see-monitor/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/see-monitor-access.log combined;
    error_log  /var/log/nginx/see-monitor-error.log warn;
}
